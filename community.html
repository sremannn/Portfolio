<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
        <link rel="StyleSheet" href="./style.css">
        <title>Community</title>
    </head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Alatsi&family=Sankofa+Display&display=swap');
    :root {
        --sans: "Inter", sans-serif, -apple-system, ui-sans-serif, system-ui, blinkmacsystemfont, sego ui, roboto, helvetica neue, arial, noto sans, sans-serif, monospace;
        --accents-8: #fafafa;
        --accents-7: #eaeaea;
        --accents-6: #999;
        --accents-5: #888;
        --accents-4: #666;
        --accents-3: #444;
        --accents-2: #333;
        --accents-1: #111;
        --transition-left: left .2s ease-in-out;
        --transition-width: width .2s ease-in-out
      }
      
      *,
      :after,
      :before {
        border: 0;
        box-sizing: border-box;
        margin: 0;
        padding: 0
      }
      
      html {
        -webkit-text-size-adjust: 100%;
        -moz-text-size-adjust: 100%;
        text-size-adjust: 100%;
        font-size: 20px;
        line-height: 1.15;
        scroll-behavior: auto;
        -moz-tab-size: 4;
        -o-tab-size: 4;
        tab-size: 4
      }
      
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #000;
        font-family: var(--sans);
        font-size: 1rem;
        font-weight: 400;
        height: 100vh;
        line-height: inherit;
        overflow-x: hidden;
        overflow-y: auto;
        position: relative;
        text-rendering: optimizespeed;
        width: 100%;
      }
      
      button {
        background: none;
        line-height: 1.15;
        margin: 0;
        outline: none;
        padding: 0;
        text-transform: none
      }
      
      .header {
        align-items: center;
        display: flex;
        height: 100%;
        justify-content: center;
        width: 100%
      }
      
      .app-title,
      .header-bg,
      .header-icon,
      .main section .section-title,
      .start,
      .switcher-curr,
      .switcher-disabled,
      .switcher-glow,
      .switcher-stroke {
        pointer-events: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none
      }
      
      .header-bg {
        mix-blend-mode: screen;
        opacity: .4;
        top: 0;
        z-index: 3
      }
      
      .header-bg svg {
        height: 200%;
        width: 200%;
        transform: translate(-25%, -25%)
      }
      
      .header-bg,
      .header-icon {
        height: 100%;
        left: 0;
        margin: 0 auto;
        overflow: hidden;
        position: absolute;
        right: 0;
        width: 100%
      }
      
      .header-icon {
        bottom: 0;
        opacity: .2;
        z-index: 1
      }
      
      .app-title {
        align-items: center;
        bottom: 100px;
        display: flex;
        flex-direction: column;
      /*   font-size: 34.18px; */
        font-size: 33px;
        height: 100%;
        justify-content: center;
        left: 0;
        letter-spacing: -3px;
        margin: 0 auto;
        padding: 0 5px;
        position: absolute;
        right: 0;
        width: 100%;
        z-index: 2
      }
      
      .app-title h1 {
        background: linear-gradient(to left, #fff, var(--accents-7));
        background-clip: text;
        -webkit-background-clip: text;
        background-position-x: 100%;
        color: transparent;
        font-weight: 500;
        position: relative;
        white-space: nowrap
      }
      
      .start {
        height: 44px;
        inset: 0;
        margin: auto;
        position: absolute;
        width: 100%
      }
      
      .switcher {
        border: 1px solid var(--accents-2);
        border-radius: 9999px;
        box-shadow: none;
        position: relative;
        z-index: 10
      }
      
      .switcher:after {
        background: linear-gradient(to left, var(--accents-2) 20%, var(--accents-2) 44%, var(--accents-6) 50%, var(--accents-3) 60%, var(--accents-2) 63%, var(--accents-2) 100%);
        background-position-x: var(--x);
        background-size: 200% auto;
        border-radius: inherit;
        bottom: -1px;
        content: "";
        height: 100%;
        left: 0;
        position: absolute;
        transition: background-position-x .6s ease;
        width: 100%;
        z-index: -1
      }
      
      .switcher-fixed {
        margin: 0;
        position: fixed;
        top: 15px
      }
      
      .switcher-root {
        background: var(--accents-1);
        display: flex;
        overflow: hidden;
        padding: 4px
      }
      
      .switcher-btn,
      .switcher-root {
        border-radius: inherit;
        position: relative
      }
      
      .switcher-btn {
        background: transparent;
        border: 0;
        color: var(--accents-5);
        cursor: pointer;
        font-family: Inter, sans-serif;
        font-size: 14px;
        font-weight: 500;
        height: 36px;
        padding: 0 20px;
        transition: color .15s ease
      }
      
      .btn-active,
      .switcher-btn:hover {
        color: var(--accents-8)
      }
      
      .btn-active {
        text-shadow: 1px 1px 12px hsla(0, 0%, 100%, .4)
      }
      
      .switcher-stroke {
        background: linear-gradient(90deg, transparent, var(--accents-4) 20%, var(--accents-2) 67.19%, transparent);
        height: 1px;
        left: 32px;
        position: absolute;
        top: -1px;
        width: 90%;
        z-index: -1
      }
      
      .switcher-glow {
        background: #fff;
        bottom: -52px;
        filter: blur(32px);
        height: 50px;
        transition: var(--transition-left);
        width: 39.5px;
        z-index: 0
      }
      
      .switcher-curr,
      .switcher-glow {
        border-radius: inherit;
        position: absolute;
        top: 4px
      }
      
      .switcher-curr {
        background: hsla(0, 0%, 100%, .08);
        height: 36px;
        left: 4px;
        transition: var(--transition-left), var(--transition-width);
        width: 79px
      }
      
      .main {
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%
      }
      
      .main section {
        background: #000;
        height: 100%;
        min-height: calc(100vh + 15px);
        position: relative;
        z-index: 4
      }
      
      .main section:after {
        background: linear-gradient(90deg, transparent, var(--accents-4) 10%, var(--accents-4) 80%, transparent);
        content: "";
        height: 1px;
        left: 0;
        position: absolute;
        top: 0;
        width: 100%;
        z-index: 2
      }
      
      .main section .section-title {
        background: linear-gradient(120deg, var(--accents-8), var(--accents-4) 70%, var(--accents-8));
        background-clip: text;
        -webkit-background-clip: text;
        background-position-x: 100%;
        color: transparent;
        font-size: 34.18px;
        font-weight: 500;
        letter-spacing: -3px;
        opacity: .9;
        padding: 75px 0 0 25px;
        text-transform: capitalize;
        white-space: nowrap
      }
      
      .main section:last-child {
        min-height: 150vh
      }
      
      @media (460px <=width <=640px) {
        .app-title {
          font-size: 27.34px
        }
      }
      
      @media (390px <=width <=460px) {
        .app-title {
          font-size: 24.61px;
          letter-spacing: -2px
        }
      
        .switcher {
          transform: scale(.9)
        }
      }
      
      @media (width <=390px) {
        .app-title {
          font-size: 21.88px
        }
      
        .switcher {
          transform: scale(.8)
        }
      }

      .pic img {
        display: inline;
        margin: auto;
        height: 100px;
        width: -100px;
        align-items: left;
      }

      h1{
        font-family: "Alatsi", sans-serif;
        font-size: 30px;
        text-align: left;
        color: white;
        font-style: normal;
        font-weight: 400;
      }

      h2{
        font-family: "Alatsi", sans-serif;
        font-size: 24px;
        text-align: left;
        color: white;
        font-style: normal;
        font-weight: 400;
      }

      p{
        font-family: "Space Mono", monospace;
        font-size: 16px;
        text-align: left;
        color: white;
        font-style: normal;
      }

      a{
        text-decoration: none;
        color: white;
      }
</style>
